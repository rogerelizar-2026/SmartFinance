<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="brandGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="brandGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Símbolo da carteira -->
  <g filter="url(#brandGlow)" transform="translate(10, 10)">
    <!-- Corpo principal -->
    <rect x="0" y="20" width="110" height="80" rx="14" fill="url(#brandGrad)"/>

    <!-- Aba superior -->
    <path d="M 0 35 Q 0 20 15 20 L 95 20 Q 110 20 110 35 L 110 45 L 0 45 Z" fill="url(#brandGrad)"/>

    <!-- Linha divisória -->
    <line x1="0" y1="45" x2="110" y2="45" stroke="white" stroke-width="1.5" opacity="0.5"/>

    <!-- Fecho -->
    <rect x="85" y="55" width="32" height="24" rx="12" fill="#0a0e1a" opacity="0.3"/>
    <circle cx="101" cy="67" r="8" fill="white" opacity="0.9"/>
    <circle cx="101" cy="67" r="5" fill="url(#brandGrad2)"/>

    <!-- Circuitos -->
    <g stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75">
      <path d="M 15 55 L 40 55 L 50 63"/>
      <circle cx="15" cy="55" r="2" fill="white"/>
      <circle cx="50" cy="63" r="2" fill="white"/>

      <path d="M 15 72 L 60 72 L 68 80 L 80 80"/>
      <circle cx="15" cy="72" r="2" fill="white"/>
      <circle cx="80" cy="80" r="2" fill="white"/>

      <path d="M 15 85 L 32 85 L 40 92"/>
      <circle cx="15" cy="85" r="2" fill="white"/>
      <circle cx="40" cy="92" r="2" fill="white"/>

      <!-- Chip -->
      <rect x="62" y="55" width="12" height="12" rx="2" fill="none" stroke-width="1.2"/>
      <line x1="68" y1="55" x2="68" y2="51"/>
      <line x1="68" y1="67" x2="68" y2="71"/>
      <line x1="62" y1="61" x2="58" y2="61"/>
      <line x1="74" y1="61" x2="78" y2="61"/>
    </g>

    <!-- Linhas decorativas -->
    <line x1="20" y1="92" x2="70" y2="92" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    <line x1="20" y1="97" x2="50" y2="97" stroke="white" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- Texto "Smart Wallet" -->
  <g transform="translate(140, 0)">
    <text x="0" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#brandGrad)" letter-spacing="-1">
      Smart
    </text>
    <text x="0" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#brandGrad)" letter-spacing="-1">
      Wallet
    </text>

    <!-- Subtítulo decorativo -->
    <line x1="0" y1="135" x2="80" y2="135" stroke="url(#brandGrad)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  </g>
</svg>